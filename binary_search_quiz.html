<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Search Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --accent: #58a6ff;
    --accent-dim: #1f3a5f;
    --green: #3fb950;
    --green-dim: #122d1c;
    --red: #f85149;
    --red-dim: #3d1217;
    --yellow: #d29922;
    --text: #e6edf3;
    --muted: #7d8590;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    margin-top: 8px;
    font-size: 15px;
  }

  /* Progress */
  .progress-bar-wrap {
    width: 100%;
    max-width: 640px;
    margin-bottom: 28px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 640px;
    padding: 32px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .question {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.55;
    margin-bottom: 28px;
  }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #adbac7;
    margin: 14px 0 22px;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateX(3px);
  }

  .option-btn .key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 7px;
    border-radius: 4px;
    min-width: 26px;
    text-align: center;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: var(--green-dim);
  }

  .option-btn.correct .key { background: var(--green); color: #000; }

  .option-btn.wrong {
    border-color: var(--red);
    background: var(--red-dim);
  }

  .option-btn.wrong .key { background: var(--red); color: #fff; }

  .option-btn:disabled { cursor: default; transform: none; }

  /* Explanation */
  .explanation {
    margin-top: 22px;
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.65;
    animation: fadeIn 0.3s ease;
    display: none;
    border-left: 3px solid;
  }

  .explanation.show { display: block; }

  .explanation.correct-exp {
    background: var(--green-dim);
    border-color: var(--green);
    color: #aff3c0;
  }

  .explanation.wrong-exp {
    background: var(--red-dim);
    border-color: var(--red);
    color: #ffb3b0;
  }

  .explanation strong {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Next button */
  .next-btn {
    margin-top: 24px;
    display: none;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 13px 28px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .next-btn.show { display: inline-flex; align-items: center; gap: 8px; }
  .next-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  /* Score screen */
  .score-screen {
    text-align: center;
    animation: fadeIn 0.4s ease;
  }

  .score-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    border: 3px solid var(--accent);
    background: var(--accent-dim);
  }

  .score-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 38px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .score-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .score-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    margin-bottom: 10px;
  }

  .score-msg { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

  .breakdown {
    text-align: left;
    margin-bottom: 32px;
  }

  .breakdown h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .breakdown-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.5;
  }

  .breakdown-item:last-child { border-bottom: none; }

  .tick { font-size: 16px; flex-shrink: 0; padding-top: 1px; }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 8px;
    padding: 13px 28px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .restart-btn:hover { background: var(--accent-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">// algorithm quiz</div>
  <h1>Binary <span>Search</span></h1>
  <p class="subtitle">10 questions · One at a time · Instant feedback</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-meta">
    <span id="q-counter">Question 1 of 10</span>
    <span id="score-counter">Score: 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="card" id="quiz-card">
  <div class="q-meta" id="q-meta">Question 1</div>
  <div class="question" id="question-text"></div>
  <div id="code-area"></div>
  <div class="options" id="options"></div>
  <div class="explanation" id="explanation"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next question →</button>
</div>

<script>
const questions = [
  {
    q: "What is the time complexity of Binary Search in the worst case?",
    options: ["O(n)", "O(log n)", "O(n log n)", "O(1)"],
    answer: 1,
    explanation: "Binary Search halves the search space each step, so it takes at most log₂(n) steps to find or rule out a target. That gives a worst-case complexity of O(log n)."
  },
  {
    q: "Binary Search requires the input array to be:",
    options: ["Filled with unique elements", "Sorted in ascending or descending order", "Stored in a linked list", "Shorter than 1000 elements"],
    answer: 1,
    explanation: "Binary Search relies on comparing the target to the middle element and discarding half the array. This only works correctly when the array is sorted — otherwise the 'discard half' logic is invalid."
  },
  {
    q: "Given the sorted array [2, 5, 8, 12, 16, 23, 38, 56, 72, 91], which element is checked FIRST when searching for 23?",
    options: ["2", "16", "38", "23"],
    answer: 1,
    explanation: "The first step always checks the middle element. With 10 elements (indices 0–9), mid = (0+9)/2 = 4, which is index 4 → value 16. Since 23 > 16, the search continues in the right half."
  },
  {
    q: "What does the following binary search implementation return when the target is NOT found?",
    code: `function binarySearch(arr, target) {\n  let lo = 0, hi = arr.length - 1;\n  while (lo <= hi) {\n    let mid = Math.floor((lo + hi) / 2);\n    if (arr[mid] === target) return mid;\n    else if (arr[mid] < target) lo = mid + 1;\n    else hi = mid - 1;\n  }\n  return -1;\n}`,
    options: ["0", "null", "-1", "undefined"],
    answer: 2,
    explanation: "When lo > hi the loop exits without finding the target. The function then hits `return -1`, the conventional sentinel value indicating the element is absent from the array."
  },
  {
    q: "Why should you calculate mid as `lo + Math.floor((hi - lo) / 2)` instead of `Math.floor((lo + hi) / 2)`?",
    options: ["It's faster on modern CPUs", "It avoids integer overflow when lo + hi exceeds MAX_INT", "The result is more accurate", "It only works with even-length arrays"],
    answer: 1,
    explanation: "In languages with fixed-size integers (C, Java…), `(lo + hi)` can overflow when both values are large. Writing `lo + (hi - lo) / 2` keeps the intermediate value small, preventing overflow. JavaScript numbers are 64-bit floats so it matters less there, but it's still best practice."
  },
  {
    q: "How many comparisons does Binary Search need in the worst case to search an array of 1,024 elements?",
    options: ["1,024", "512", "10", "32"],
    answer: 2,
    explanation: "log₂(1024) = 10. Binary search halves the range each step, so after 10 steps at most, the range is empty. The answer is 10 comparisons."
  },
  {
    q: "Which of the following is a valid reason to prefer Binary Search over Linear Search?",
    options: ["Binary Search works on unsorted arrays", "Binary Search has O(1) space complexity while Linear Search does not", "Binary Search is faster on large sorted datasets", "Binary Search is simpler to implement"],
    answer: 2,
    explanation: "Binary Search's O(log n) cost shines on large sorted arrays — searching 1 billion elements takes only ~30 steps. Linear Search must scan every element in the worst case, making it O(n). Both have O(1) space for the iterative version."
  },
  {
    q: "What is the space complexity of the iterative version of Binary Search?",
    options: ["O(n)", "O(log n)", "O(1)", "O(n log n)"],
    answer: 2,
    explanation: "The iterative version uses only a fixed number of variables (lo, hi, mid) regardless of input size — that's O(1) auxiliary space. The recursive version, by contrast, uses O(log n) stack frames."
  },
  {
    q: "After the first comparison in a Binary Search on a sorted array of 16 elements, what is the maximum number of elements still to be considered?",
    options: ["16", "8", "7", "4"],
    answer: 2,
    explanation: "With 16 elements the midpoint is index 7 (0-indexed). After comparing and discarding one half, you have at most 7 elements remaining (either indices 0–6 or 8–15, but 8–15 is 8 elements — so the smaller half is 7). The answer is 7."
  },
  {
    q: "Which scenario makes Binary Search perform at its BEST (fewest comparisons)?",
    options: ["The target is the last element", "The target is not in the array", "The target is exactly the middle element", "The array has duplicate values"],
    answer: 2,
    explanation: "If the target equals the very first mid element checked, Binary Search returns after just 1 comparison — that's O(1) best case. This happens when the target sits exactly at the midpoint of the initial range."
  }
];

let current = 0;
let score = 0;
let answered = false;
const results = [];

function renderQuestion() {
  const q = questions[current];
  answered = false;

  document.getElementById('q-meta').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('q-counter').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('score-counter').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('question-text').textContent = q.q;

  const codeArea = document.getElementById('code-area');
  if (q.code) {
    codeArea.innerHTML = `<div class="code-block">${escHtml(q.code)}</div>`;
  } else {
    codeArea.innerHTML = '';
  }

  const keys = ['A', 'B', 'C', 'D'];
  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="key">${keys[i]}</span> ${escHtml(opt)}`;
    btn.onclick = () => selectAnswer(i);
    optionsEl.appendChild(btn);
  });

  const exp = document.getElementById('explanation');
  exp.className = 'explanation';
  exp.innerHTML = '';

  const next = document.getElementById('next-btn');
  next.className = 'next-btn';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  const isCorrect = idx === q.answer;

  if (isCorrect) score++;

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  results.push({ q: q.q, correct: isCorrect, correctAnswer: q.options[q.answer] });

  const exp = document.getElementById('explanation');
  exp.className = `explanation ${isCorrect ? 'correct-exp' : 'wrong-exp'} show`;
  exp.innerHTML = `<strong>${isCorrect ? '✓ Correct' : '✗ Incorrect'}</strong>${q.explanation}`;

  document.getElementById('score-counter').textContent = `Score: ${score}`;

  const next = document.getElementById('next-btn');
  next.textContent = current < questions.length - 1 ? 'Next question →' : 'See results →';
  next.className = 'next-btn show';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showScore();
  } else {
    renderQuestion();
  }
}

function showScore() {
  const pct = Math.round((score / questions.length) * 100);
  let grade, msg;
  if (pct === 100) { grade = "Perfect! 🏆"; msg = "You've mastered binary search."; }
  else if (pct >= 80) { grade = "Great job! 🎉"; msg = "Solid understanding — review the misses below."; }
  else if (pct >= 60) { grade = "Good effort 👍"; msg = "A few gaps to fill — check the breakdowns."; }
  else { grade = "Keep practising 📚"; msg = "Review the explanations and try again."; }

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('q-counter').textContent = 'Quiz complete';
  document.getElementById('score-counter').textContent = `Score: ${score}/${questions.length}`;

  const breakdownHtml = results.map((r, i) =>
    `<div class="breakdown-item">
      <span class="tick">${r.correct ? '✅' : '❌'}</span>
      <div>
        <div style="color:var(--muted);font-size:12px;margin-bottom:3px">Q${i+1}</div>
        <div>${escHtml(r.q)}</div>
        ${!r.correct ? `<div style="color:var(--green);font-size:13px;margin-top:4px">Correct answer: ${escHtml(r.correctAnswer)}</div>` : ''}
      </div>
    </div>`
  ).join('');

  document.getElementById('quiz-card').innerHTML = `
    <div class="score-screen">
      <div class="score-circle">
        <div class="score-number">${score}/${questions.length}</div>
        <div class="score-label">${pct}%</div>
      </div>
      <div class="score-title">${grade}</div>
      <div class="score-msg">${msg}</div>
      <div class="breakdown">
        <h3>Question Breakdown</h3>
        ${breakdownHtml}
      </div>
      <button class="restart-btn" onclick="restartQuiz()">↺ Restart quiz</button>
    </div>`;
}

function restartQuiz() {
  current = 0; score = 0; results.length = 0;
  document.getElementById('quiz-card').innerHTML = `
    <div class="q-meta" id="q-meta"></div>
    <div class="question" id="question-text"></div>
    <div id="code-area"></div>
    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>`;
  renderQuestion();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderQuestion();
</script>
</body>
</html>
